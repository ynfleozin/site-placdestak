<section class="budget-section" id="orcamento">
  <div class="section-header">
    <h2>Pedido de Orçamento</h2>
    <p>Preencha os dados abaixo e entraremos em contacto brevemente.</p>
  </div>

  <div class="content-wrapper">
    <div class="form-container">
      <form>
        <div class="form-group">
          <label for="name">Nome completo</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Ex: João Silva"
            required
          />
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />
          </div>
          <div class="form-group">
            <label for="phone">Telefone</label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="(+351) 900 000 000"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="message">Mensagem ou detalhes do projeto</label>
          <textarea
            id="message"
            name="message"
            rows="4"
            placeholder="Descreva o que precisa..."
            required
          ></textarea>
        </div>

        <button type="submit" class="submit-btn">Solicitar Orçamento</button>
      </form>
    </div>

    <div class="image-container">
      <img src="assets/imgs/budget/budgetImg.webp" alt="Projeto de construção" />
    </div>
  </div>
</section>
